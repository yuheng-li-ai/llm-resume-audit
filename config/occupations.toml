# Frozen 18-occupation panel for Proposal A factorial audit.
#
# Design: balanced 3 x 3 x 2 occupation panel
#   stereotype  in {male, female, neutral}
#   skill_tier  in {high, mid, low}
#   2 occupations per (stereotype x tier) cell
#
# Selection criteria:
#   1. Coverage: every (stereotype x tier) cell populated by exactly 2 occupations
#   2. O*NET 28.1 data completeness (Occupation Data + Skills + Abilities + Knowledge populated)
#   3. BLS OES May-2024 employment >= ~100K (relevance to real labor markets)
#   4. Bertrand-Mullainathan / Tilcsik / Goldin precedent for stereotype assignment
#
# Lock policy: per CHECKLIST rule 4, this list is frozen. Changes require
# explicit user approval; see Phase 1.1 verification test.
#
# Reference: O*NET-SOC 28.1 detailed occupation list
#   https://www.onetcenter.org/taxonomy/2025/list/?fmt=html
# OES values are approximate published BLS aggregates (May 2024 release);
# verify exact figures during Phase 1.1.
#
# SOC format: "XX-YYYY"; O*NET-SOC adds ".NN" suffix (we store both).

